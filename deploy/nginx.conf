# PassVault nginx site. setup.sh substitutes __DOMAIN__ and __APP_DIR__ and
# installs this to /etc/nginx/sites-available/passvault once the TLS cert exists.

# --- HTTP: ACME challenge + redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    # HTTP/2 via the listen flag (compatible with nginx < 1.25.1, e.g. Ubuntu
    # 22.04's nginx 1.18). On 1.25.1+ this still works; the `http2 on;` form is
    # only available there, so we use the portable spelling.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    # script-src needs 'wasm-unsafe-eval' for the Argon2 WASM module, and
    #   https://telegram.org for the Mini App SDK (telegram-web-app.js), which
    #   telegram.js injects only when launched inside Telegram.
    # style-src 'unsafe-inline' covers inline style="" attributes in the UI.
    # frame-ancestors allows the Telegram Mini App webview to embed /app.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;

    root __APP_DIR__;

    # API -> gunicorn/uvicorn on loopback
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Mini App static (vault-web)
    location /app/ {
        alias __APP_DIR__/vault-web/;
        autoindex off;
    }

    # crypto.js + Argon2 WASM (imported by vault-web via ../crypto/...)
    location /crypto/ {
        alias __APP_DIR__/crypto/;
        autoindex off;
    }

    # Extension download: the built .zip is published to __APP_DIR__/download by
    # deploy/setup.sh. Served as an attachment from our own trusted domain so
    # colleagues fetch the extension from https://__DOMAIN__/download/ instead of
    # an untrusted third party.
    location ^~ /download/ {
        alias __APP_DIR__/download/;
        autoindex off;
        types { application/zip zip; }
        default_type application/octet-stream;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = / { return 301 /app/; }

    # never serve dotfiles, backend, deploy, data
    location ~ /\.            { deny all; }
    location ^~ /backend/     { deny all; }
    location ^~ /deploy/      { deny all; }
    location ^~ /data/        { deny all; }
    location ^~ /backups/     { deny all; }
    location ^~ /bot/         { deny all; }
}
